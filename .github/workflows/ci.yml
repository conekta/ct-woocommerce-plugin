name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.1', '8.2', '8.3', '8.4', '8.5']
    name: Build & Test (PHP ${{ matrix.php-version }})
    services:
      mockoon:
        image: mockoon/cli:latest
        ports:
          - 3000:3000
        options: >-
          mockoon/cli:latest
          --data https://raw.githubusercontent.com/conekta/openapi/refs/heads/main/mocks/conekta_api.json
          --port 3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          extensions: curl, json

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Node dependencies and build
        run: |
          npm ci
          npm run build

      - name: Wait for Mockoon to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/ping > /dev/null 2>&1; then
              echo "Mockoon is ready"
              exit 0
            fi
            echo "Waiting for Mockoon... ($i/30)"
            sleep 1
          done
          echo "Mockoon failed to start"
          exit 1

      - name: Run PHPUnit tests
        env:
          CONEKTA_HOST: http://localhost:3000
        run: vendor/bin/phpunit --testdox

      - name: Run JS tests
        run: npm test

  e2e-checkout:
    runs-on: ubuntu-latest
    name: E2E Classic Checkout
    needs: build-and-test
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        env:
          CONEKTA_API_KEY: ${{ secrets.CONEKTA_API_KEY }}
          STORE_URL: https://woocommerce.stg.conekta.io
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: npm run test:e2e

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-artifacts
          path: |
            /tmp/e2e-*.png
            /tmp/e2e-videos/*.webm
          retention-days: 3
