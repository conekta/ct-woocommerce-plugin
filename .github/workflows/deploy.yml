name: Deploy to WordPress.org

on:
  release:
    types: [published]

jobs:
  tag-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v6

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, soap, bcmath, gd, exif, opcache, zip
          ini-values: post_max_size=256M, max_execution_time=180
          coverage: none

      - name: Instalar dependencias de Composer
        run: composer install --no-dev --no-interaction --no-progress

      - name: Instalar Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Instalar dependencias de NPM
        run: |
          npm ci
          npm run build

      - name: Despliegue en WordPress.org
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          # Instalar SVN
          sudo apt-get -y install subversion
          
          # Checkout del repositorio SVN de WordPress.org (solo trunk, sin descargar tags históricos)
          svn checkout --depth immediates https://plugins.svn.wordpress.org/conekta-payment-gateway/ svn-dir --username $SVN_USERNAME --password $SVN_PASSWORD
          svn update --set-depth infinity svn-dir/trunk
          svn update --set-depth immediates svn-dir/tags
          
          # Sincroniza los archivos
          rsync -av --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".claude" \
            --exclude=".devcontainer" \
            --exclude=".idea" \
            --exclude=".gitignore" \
            --exclude=".gitattributes" \
            --exclude=".nvmrc" \
            --exclude=".DS_Store" \
            --exclude=".phpunit.result.cache" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="svn-dir" \
            --exclude="vendor/squizlabs/php_codesniffer" \
            --exclude="composer.json" \
            --exclude="composer.lock" \
            --exclude="package.json" \
            --exclude="package-lock.json" \
            --exclude="webpack.config.js" \
            --exclude="phpunit.xml" \
            --exclude="Dockerfile" \
            --exclude="*.zip" \
            --exclude="readme_files" \
            --exclude="CLAUDE.md" \
            . svn-dir/trunk/
          
          # Cambia al directorio SVN
          cd svn-dir
          
          # Agrega nuevos archivos y elimina los eliminados
          svn status | grep '^?' | awk '{print $2}' | xargs -I x svn add x
          svn status | grep '^!' | awk '{print $2}' | xargs -I x svn delete x
          
          # Crea una copia en la carpeta tags
          svn cp trunk tags/${{ github.ref_name }}
          
          # Commit a SVN
          svn commit -m "Despliegue de la versión ${{ github.ref_name }}" --username $SVN_USERNAME --password $SVN_PASSWORD
